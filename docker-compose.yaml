services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: contacts_db
      POSTGRES_USER: vlad
      POSTGRES_PASSWORD: qwerty
    ports:
      - "5432:5432"
    healthcheck:
      # Команда pg_isready перевіряє, чи приймає база з'єднання
      test: ["CMD-SHELL", "pg_isready -U vlad -d contacts_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
